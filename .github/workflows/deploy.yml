name: Deploy to Azure VM

# Publica a Parking.API na mesma VM dos demais servicos, na porta 83,
# apos um build/test verde do workflow "CI" na main, ou manualmente
# pela aba Actions.
on:
  workflow_run:
    workflows: [ "CI" ]        # espera o workflow ci.yml passar
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # rodrigofurlaneti/parking

jobs:
  build-and-push:
    name: Build & Push image (GHCR)
    runs-on: ubuntu-latest
    # So roda se o CI passou (ou se foi disparo manual)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados/tags da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          # A solucao/Dockerfile do backend ficam em backend/src.
          context: ./backend/src
          file: ./backend/src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            IMAGE="ghcr.io/rodrigofurlaneti/parking:latest"

            # Autentica no GHCR (PAT com read:packages)
            echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            sudo docker pull "$IMAGE"
            sudo docker rm -f parking-api || true
            sudo docker run -d \
              --name parking-api \
              --restart unless-stopped \
              -p 83:8080 \
              --env-file /opt/parkingservice/.env \
              "$IMAGE"

            sudo docker image prune -f

            # Verificacao rapida do health (rota api/health)
            sleep 8
            curl -fsS http://localhost:83/api/health && echo " -> OK"
