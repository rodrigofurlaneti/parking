server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback de SPA: qualquer rota que nao corresponda a um arquivo
    # estatico existente cai no index.html, deixando o React Router
    # (react-router-dom) tratar o roteamento no client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets versionados pelo Vite (hash no nome do arquivo).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
